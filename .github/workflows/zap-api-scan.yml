name: "OWASP ZAP API Scan"

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Scan the webapplication
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Next.js app needs to be built and served to be scanned locally
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "mock_api_key"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "mock.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "mock_project_id"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "mock.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:abcdef"

      - name: Start Next.js in background
        run: npx serve@latest out -l 3000 &
        env:
          PORT: 3000
          NEXT_PUBLIC_FIREBASE_API_KEY: "mock_api_key"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "mock.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "mock_project_id"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "mock.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:abcdef"

      - name: Wait for server to start
        run: sleep 10

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          fail_action: false
          cmd_options: '-a'
